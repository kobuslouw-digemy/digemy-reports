<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tongaat Mozambique — Digemy Operational Optimisation Report</title>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #EDF0F8; --navy: #162040; --purple: #9B8CF5;
  --text: #12183A; --muted: #4A5275; --white: #FFFFFF;
  --border: rgba(22,32,64,0.12);
  --coral-bg: #FEF0EC; --coral: #E8441A;
  --green-bg: #EDFAF3; --green: #16A34A;
}
body { font-family: 'Work Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.65; }
.page { max-width: 1000px; margin: 0 auto; padding: 0 28px 80px; }
.hero { background: var(--navy); color: white; padding: 52px 52px 44px; margin-bottom: 44px; border-radius: 0 0 20px 20px; position: relative; overflow: hidden; }
.hero::before { content:''; position:absolute; top:-80px; right:-80px; width:320px; height:320px; border-radius:50%; background:rgba(155,140,245,0.07); pointer-events:none; }
.hero::after  { content:''; position:absolute; bottom:-60px; right:-60px; width:280px; height:280px; border-radius:50%; background:rgba(155,140,245,0.05); pointer-events:none; }
.hero-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:28px; }
.wordmark { font-size:22px; font-weight:900; color:white; letter-spacing:-0.5px; }
.wordmark span { color:var(--purple); }
.hero-tag { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.4); font-weight:800; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:50px; padding:4px 14px; }
.eyebrow { font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:10px; font-weight:700; }
.hero h1 { font-size:54px; font-weight:900; line-height:1.0; margin-bottom:32px; color:white; letter-spacing:-1px; }
.hero h1 span { color:var(--purple); }
.hero-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.hs { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:16px 18px; }
.hs-label { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:rgba(255,255,255,0.4); margin-bottom:6px; }
.hs-val { font-size:22px; font-weight:900; color:white; }
.hs-val.p { color:var(--purple); }
.hs-val.g { color:#4ADE80; }
.hs-sub { font-size:11px; color:rgba(255,255,255,0.3); margin-top:2px; }
.section { margin-bottom:44px; }
.sec-hd { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.sec-icon { width:36px; height:36px; border-radius:8px; background:var(--navy); color:white; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.sec-title { font-size:22px; font-weight:900; color:var(--navy); letter-spacing:-0.3px; }
.card { background:var(--white); border-radius:14px; border:1px solid var(--border); padding:28px 32px; box-shadow:0 2px 12px rgba(22,32,64,0.06); }
.card p { color:var(--muted); font-size:15px; margin-bottom:16px; line-height:1.7; }
.card p:last-child { margin-bottom:0; }
.card p strong { color:var(--navy); font-weight:700; }
.pill-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }
.pill { background:rgba(22,32,64,0.06); border:1px solid rgba(22,32,64,0.1); border-radius:50px; padding:5px 14px; font-size:13px; font-weight:700; color:var(--navy); }
.quote-bar { margin-top:20px; border-left:3px solid var(--purple); padding:12px 18px; background:rgba(155,140,245,0.06); border-radius:0 8px 8px 0; font-size:14px; font-weight:700; color:var(--navy); font-style:italic; }
.biz-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.biz-card { background:var(--white); border-radius:12px; border:1px solid var(--border); padding:20px; box-shadow:0 2px 8px rgba(22,32,64,0.05); }
.biz-title { font-size:14px; font-weight:800; color:var(--navy); margin-bottom:8px; }
.biz-card p { font-size:13px; color:var(--muted); line-height:1.6; }
.tbl-wrap { background:var(--white); border-radius:14px; border:1px solid var(--border); overflow:hidden; box-shadow:0 2px 12px rgba(22,32,64,0.06); }
table { width:100%; border-collapse:collapse; font-size:14px; }
thead th { background:var(--navy); color:rgba(255,255,255,0.55); font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; padding:12px 18px; text-align:left; }
.r-tbl thead th:not(:first-child) { text-align:right; }
tbody tr { border-bottom:1px solid var(--border); }
tbody tr:last-child { border-bottom:none; }
tbody tr:nth-child(odd) { background:rgba(22,32,64,0.02); }
td { padding:11px 18px; color:var(--muted); vertical-align:top; }
td:first-child { color:var(--navy); font-weight:700; }
.r-tbl td:not(:first-child) { text-align:right; }
.rec { color:var(--green); font-weight:800; }
.total-row td { background:var(--navy); color:white; font-weight:800; }
.total-row .rec { color:#4ADE80; }
.lc { background:var(--white); border-radius:16px; border:1px solid var(--border); overflow:hidden; margin-bottom:24px; box-shadow:0 2px 16px rgba(22,32,64,0.07); }
.lc-top { display:grid; grid-template-columns:1fr auto; gap:24px; padding:26px 28px 22px; border-bottom:1px solid var(--border); align-items:start; }
.lc-num { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:2px; color:var(--purple); margin-bottom:6px; }
.lc-title { font-size:20px; font-weight:900; color:var(--navy); line-height:1.2; }
.lc-body { font-size:14px; color:var(--muted); margin-top:10px; line-height:1.7; }
.lc-stats { display:flex; flex-direction:column; gap:7px; min-width:220px; }
.sp { background:var(--navy); border-radius:50px; padding:9px 18px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
.sp-l { font-size:12px; font-weight:700; color:rgba(255,255,255,0.6); white-space:nowrap; }
.sp-v { font-size:13px; font-weight:900; color:var(--purple); text-align:right; }
.tag { display:inline-flex; align-items:center; gap:6px; border-radius:50px; padding:4px 12px 4px 8px; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.8px; margin:16px 28px 6px; }
.dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.t-eff { background:var(--coral-bg); color:var(--coral); }
.t-eff .dot { background:var(--coral); }
.t-dig { background:var(--green-bg); color:var(--green); }
.t-dig .dot { background:var(--green); }
.eff-txt { font-size:14px; font-weight:500; color:var(--muted); line-height:1.7; margin:0 28px 16px; }
.dig-txt { font-size:14px; font-weight:500; color:var(--muted); line-height:1.7; margin:0 28px 22px; }
.vs { background:var(--navy); border-radius:16px; padding:32px 36px; color:white; margin-bottom:44px; }
.vs-ey { font-size:11px; text-transform:uppercase; letter-spacing:2.5px; color:rgba(255,255,255,0.35); font-weight:800; margin-bottom:20px; }
.vs-pills { display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
.vsp { background:rgba(255,255,255,0.06); border-radius:50px; padding:13px 24px; display:flex; justify-content:space-between; align-items:center; }
.vsp-l { font-size:14px; font-weight:700; color:white; }
.vsp-v { font-size:16px; font-weight:900; color:var(--purple); }
.vs p { font-size:15px; color:rgba(255,255,255,0.65); line-height:1.75; font-weight:500; }
.vs p strong { color:white; }
.mx-table thead th:nth-child(2) { color:rgba(255,140,110,0.9); }
.mx-table thead th:nth-child(3) { color:rgba(100,220,160,0.9); }
tbody .role-hdr td { background:rgba(155,140,245,0.1); color:var(--purple); font-weight:800; font-size:12px; letter-spacing:0.5px; padding:10px 18px; }
.mx-narrative { background:var(--white); border-radius:14px; border:1px solid var(--border); border-left:4px solid var(--purple); padding:24px 28px; margin-top:20px; box-shadow:0 2px 12px rgba(22,32,64,0.06); font-size:15px; color:var(--muted); line-height:1.8; font-weight:500; }
.mx-narrative strong { color:var(--navy); font-weight:800; }
.exec-card { background:var(--white); border-radius:16px; border:1px solid var(--border); padding:32px 36px; box-shadow:0 2px 12px rgba(22,32,64,0.06); }
.exec-body { font-size:16px; line-height:1.8; color:var(--text); font-weight:500; margin-bottom:24px; }
.killer { font-size:17px; font-weight:800; font-style:italic; color:var(--navy); line-height:1.5; border-left:4px solid var(--coral); padding-left:20px; margin-bottom:28px; }
.roi-block { background:var(--green-bg); border:1px solid rgba(22,163,74,0.2); border-radius:12px; padding:22px 26px; }
.roi-block h4 { font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--green); margin-bottom:10px; }
.roi-block p { font-size:14.5px; color:#0F4A2A; line-height:1.7; font-weight:500; }
.footer { background:var(--navy); color:rgba(255,255,255,0.25); text-align:center; padding:20px; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; font-weight:700; }
